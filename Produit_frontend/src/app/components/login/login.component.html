<div class="min-h-screen fixed inset-0 flex items-center justify-center bg-cover bg-center" 
     style="background-image: url('/background.avif');">
  
  <div class="absolute inset-0 bg-white/50 backdrop-blur-md"></div>

  <div class="relative w-full max-w-md p-8 m-4 rounded-3xl bg-white/95 backdrop-blur-xl border border-white shadow-[0_15px_40px_rgba(0,0,0,0.1)] overflow-hidden">
    <!-- Decorative accent -->
    <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-emerald-400 via-emerald-600 to-green-500 shadow-md"></div>

    <div class="text-center mb-8 flex flex-col items-center mt-2">
      <div class="w-24 h-24 mb-2 flex items-center justify-center">
        <svg viewBox="0 0 120 100" class="w-full h-full drop-shadow-sm">
          <path d="M20,20 L30,20 L40,65 C41,70 45,72 50,72 L85,72 C90,72 93,68 95,60 L105,30 Z" fill="none" stroke="#059669" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="50" cy="85" r="6" fill="#059669"/>
          <circle cx="80" cy="85" r="6" fill="#059669"/>
          <path d="M30,80 L15,80 M25,86 L10,86 M32,92 L20,92" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round"/>
          <rect x="58" y="45" width="28" height="15" rx="3" fill="none" stroke="#1f2937" stroke-width="2"/>
          <line x1="58" y1="49" x2="86" y2="49" stroke="#1f2937" stroke-width="2"/>
          <line x1="62" y1="54" x2="75" y2="54" stroke="#1f2937" stroke-width="1.5"/>
          <path d="M48,50 L58,62 L80,25" fill="none" stroke="#f59e0b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M82,20 A10,10 0 0,1 92,10 M88,25 A18,18 0 0,1 105,8 M94,30 A26,26 0 0,1 118,6" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h1 class="text-3xl font-black tracking-widest text-gray-800 uppercase">MARKET<span class="text-emerald-600">POS</span></h1>
      <p class="text-gray-500 mt-2 text-xs font-bold uppercase tracking-widest">Connectez-vous à la caisse</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      
      <div *ngIf="errorMessage" class="p-3 rounded-xl bg-red-50 border border-red-200 text-red-600 text-sm font-bold text-center shadow-sm">
        <i class="fas fa-exclamation-triangle mr-2"></i> {{ errorMessage }}
      </div>

      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Nom d'utilisateur</label>
        <input type="text" formControlName="username" 
               class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all shadow-inner"
               placeholder="username">
      </div>

      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Mot de passe</label>
        <input type="password" formControlName="password"
               class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all shadow-inner"
               placeholder="••••••••">
      </div>

      <button type="submit" [disabled]="loginForm.invalid || isLoading"
              class="w-full py-4 px-4 mt-4 flex items-center justify-center rounded-xl bg-emerald-600 hover:bg-emerald-500 text-white font-black tracking-widest uppercase transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed transform hover:-translate-y-1 shadow-lg shadow-emerald-600/30">
        <i *ngIf="!isLoading" class="fas fa-sign-in-alt mr-2 hover:translate-x-1 transition-transform"></i>
        <i *ngIf="isLoading" class="fas fa-circle-notch fa-spin mr-2"></i>
        {{ isLoading ? 'Connexion en cours...' : 'Ouvrir la caisse' }}
      </button>
    </form>
  </div>
</div>
