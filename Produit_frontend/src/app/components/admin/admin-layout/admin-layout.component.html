<div class="min-h-screen bg-gray-50 flex">
  <!-- Sidebar -->
  <aside class="w-64 bg-white border-r border-gray-200 hidden md:flex flex-col shadow-sm">
    <div class="h-20 flex items-center justify-center px-4 border-b border-gray-200 bg-blue-600 shadow-inner">
      <div class="w-12 h-12 flex items-center justify-center mr-2">
        <svg viewBox="0 0 120 100" class="w-full h-full">
          <!-- Adjusted colors to be visible on white bg if needed, but here bg is blue-600 -->
          <!-- We use white and yellow so it pops on the dark green background -->
          <path d="M20,20 L30,20 L40,65 C41,70 45,72 50,72 L85,72 C90,72 93,68 95,60 L105,30 Z" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="50" cy="85" r="6" fill="#ffffff"/>
          <circle cx="80" cy="85" r="6" fill="#ffffff"/>
          <path d="M30,80 L15,80 M25,86 L10,86 M32,92 L20,92" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
          <rect x="58" y="45" width="28" height="15" rx="3" fill="none" stroke="#e5e7eb" stroke-width="2"/>
          <line x1="58" y1="49" x2="86" y2="49" stroke="#e5e7eb" stroke-width="2"/>
          <line x1="62" y1="54" x2="75" y2="54" stroke="#e5e7eb" stroke-width="1.5"/>
          <path d="M48,50 L58,62 L80,25" fill="none" stroke="#fde047" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M82,20 A10,10 0 0,1 92,10 M88,25 A18,18 0 0,1 105,8 M94,30 A26,26 0 0,1 118,6" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="text-xl font-black text-white tracking-widest items-center pt-1">
        MARKET<span class="text-yellow-300">POS</span>
      </span>
    </div>
    <nav class="flex-1 p-4 space-y-2 relative z-10">
      <a routerLink="/admin/dashboard" routerLinkActive="bg-blue-50 text-blue-700 border-blue-500 shadow-[inset_4px_0_0_rgba(59,130,246,1)]" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-100 hover:text-blue-700 rounded-lg transition-all duration-300 border-l-4 border-transparent font-medium tracking-wide">
        <i class="fas fa-chart-pie w-5 h-5 mr-3 text-lg"></i>
        Tableau de Bord
      </a>
      <a routerLink="/admin/inventory" routerLinkActive="bg-blue-50 text-blue-700 border-blue-500 shadow-[inset_4px_0_0_rgba(59,130,246,1)]" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-100 hover:text-blue-700 rounded-lg transition-all duration-300 border-l-4 border-transparent font-medium tracking-wide">
        <i class="fas fa-boxes-stacked w-5 h-5 mr-3 text-lg"></i>
        Inventaire
      </a>
      <a routerLink="/admin/tickets" routerLinkActive="bg-blue-50 text-blue-700 border-blue-500 shadow-[inset_4px_0_0_rgba(59,130,246,1)]" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-100 hover:text-blue-700 rounded-lg transition-all duration-300 border-l-4 border-transparent font-medium tracking-wide">
        <i class="fas fa-receipt w-5 h-5 mr-3 text-lg"></i>
        Historique Achats
      </a>
      <a routerLink="/admin/users" routerLinkActive="bg-blue-50 text-blue-700 border-blue-500 shadow-[inset_4px_0_0_rgba(59,130,246,1)]" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-100 hover:text-blue-700 rounded-lg transition-all duration-300 border-l-4 border-transparent font-medium tracking-wide">
        <i class="fas fa-users w-5 h-5 mr-3 text-lg"></i>
        Utilisateurs
      </a>
      <div class="pt-6 mt-6 border-t border-gray-200">
        <a routerLink="/pos" class="flex items-center px-4 py-3 text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-all duration-300 font-bold tracking-wide shadow">
          <i class="fas fa-cash-register w-5 h-5 mr-3 text-lg"></i>
          Ouvrir la Caisse
        </a>
      </div>
    </nav>
    <div class="p-4 border-t border-gray-200">
      <button (click)="logout()" class="flex items-center w-full px-4 py-2 text-gray-500 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors">
        <i class="fas fa-sign-out-alt w-5 h-5 mr-3"></i>
        Deconnexion
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
    <!-- Navbar -->
    <header class="h-16 flex items-center justify-between px-8 bg-white border-b border-gray-200 shadow-sm z-20">
      <div class="flex items-center gap-3">
        <h2 class="text-xl font-bold text-gray-800">Espace Administration</h2>
      </div>
      <div class="flex items-center space-x-4">
        <div class="text-right hidden md:block">
          <p class="text-sm font-bold text-gray-800">Admin Store</p>
          <p class="text-xs text-gray-500">Superviseur</p>
        </div>
        <img src="https://ui-avatars.com/api/?name=Admin+Store&background=10b981&color=fff&size=128&rounded=true&bold=true" alt="Admin" class="w-10 h-10 rounded-full border-2 border-blue-500 shadow-sm hover:scale-105 transition-transform cursor-pointer">
      </div>
    </header>
    
    <!-- Supermarket Top Banner Decoration -->
    <div class="h-48 w-full absolute top-16 left-0 z-0 overflow-hidden opacity-30 pointer-events-none">
       <!-- Changed to Electronics background theme based on user request -->
       <img src="/background.avif" class="w-full h-full object-cover" alt="Electronics Store Background">
       <div class="absolute inset-0 bg-gradient-to-b from-transparent to-gray-50"></div>
    </div>

    <!-- Content Router Area -->
    <div class="flex-1 overflow-auto p-6 md:p-8 z-10 relative">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
