<div class="space-y-6 animate-in fade-in duration-500 relative z-10">
  <!-- Header & Search -->
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white border border-gray-200 p-6 rounded-2xl shadow-sm relative overflow-hidden">
    <div class="absolute -right-10 -top-10 w-48 h-48 bg-emerald-50 blur-3xl rounded-full"></div>
    <div class="relative z-10">
      <h2 class="text-2xl font-black text-gray-800 mb-1 tracking-wider uppercase">
        <i class="fas fa-boxes-stacked text-emerald-600 mr-2"></i>
        Bases De Données
      </h2>
      <p class="text-gray-500 text-xs font-bold uppercase tracking-widest">Gérez vos produits et prix</p>
    </div>
    <div class="flex gap-4 relative z-10 w-full sm:w-auto">
      <div class="relative flex-grow sm:flex-grow-0 sm:w-80">
        <i class="fas fa-search absolute left-4 top-3.5 text-gray-400"></i>
        <input type="text" [(ngModel)]="searchTerm" (input)="filter()" placeholder="Rechercher produits..." 
               class="w-full bg-gray-50 border border-gray-300 text-gray-800 px-4 py-3 pl-12 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 focus:outline-none transition-all shadow-inner">
      </div>
      <button (click)="openModal()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-3 rounded-xl font-black text-sm uppercase tracking-wider shadow-md hover:shadow-lg transition-all duration-300 transform hover:-translate-y-0.5 flex items-center gap-2 whitespace-nowrap">
        <i class="fas fa-plus"></i> Nouveau
      </button>
    </div>
  </div>

  <!-- Table -->
  <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm">
    <table class="w-full text-left text-sm text-gray-600">
      <thead class="bg-gray-50 text-gray-500 border-b border-gray-200 text-xs uppercase font-medium tracking-wider">
        <tr>
          <th class="px-6 py-4">Produit</th>
          <th class="px-6 py-4">Prix</th>
          <th class="px-6 py-4">Date Ajout</th>
          <th class="px-6 py-4 text-right">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
        <tr *ngFor="let p of filteredProduits" class="hover:bg-blue-50/50 transition-colors group">
          <td class="px-6 py-4 flex items-center space-x-5">
            <div class="w-14 h-14 rounded-xl bg-gray-100 overflow-hidden flex-shrink-0 border border-gray-200 group-hover:border-blue-300 transition-colors shadow-sm">
              <img [src]="p.imageUrl || 'assets/placeholder.png'" alt="Thmb" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" onerror="this.src='https://images.unsplash.com/photo-1542838132-92c53300491e?q=80&w=150&auto=format&fit=crop'">
            </div>
            <span class="font-bold text-gray-800 tracking-wide">{{ p.nomProduit }}</span>
          </td>
          <td class="px-6 py-4 font-black text-emerald-600">{{ p.prixProduit | number:'1.2-2' }} DH</td>
          <td class="px-6 py-4 text-gray-500 font-medium">{{ p.dateProduit | date:'mediumDate' }}</td>
          <td class="px-6 py-4 text-right">
            <button (click)="openModal(p)" class="w-9 h-9 rounded-lg bg-gray-100 text-gray-500 hover:text-blue-600 hover:bg-blue-100 mx-1 transition-all border border-transparent shadow-sm"><i class="fas fa-edit"></i></button>
            <button (click)="p.idProduit && deleteProduit(p.idProduit)" class="w-9 h-9 rounded-lg bg-gray-100 text-gray-500 hover:text-red-600 hover:bg-red-100 mx-1 transition-all border border-transparent shadow-sm"><i class="fas fa-trash"></i></button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Add/Edit Modal -->
<div *ngIf="showModal" class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/60 backdrop-blur-sm p-4">
  <div class="bg-white rounded-2xl border border-gray-200 w-full max-w-2xl shadow-2xl overflow-hidden flex flex-col md:flex-row">
    
    <!-- Image Preview Pane -->
    <div class="w-full md:w-2/5 bg-gray-50 p-6 flex flex-col items-center justify-center border-b md:border-b-0 md:border-r border-gray-200">
      <div class="w-full aspect-square rounded-xl overflow-hidden border-2 border-dashed border-gray-300 relative group flex items-center justify-center bg-white shadow-inner">
        <img *ngIf="editingProduit.imageUrl" [src]="editingProduit.imageUrl" class="w-full h-full object-cover" alt="Preview" onerror="this.style.display='none'">
        <div *ngIf="!editingProduit.imageUrl" class="text-gray-400 text-center text-sm p-4">
          <svg class="w-8 h-8 mx-auto mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
          Aperçu
        </div>
      </div>
    </div>

    <!-- Form Pane -->
    <div class="w-full md:w-3/5 p-6 space-y-4">
      <h3 class="text-xl font-bold text-gray-800 mb-4">{{ editingProduit.idProduit ? 'Modifier Produit' : 'Nouveau Produit' }}</h3>
      
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">Nom du Produit</label>
        <input type="text" [(ngModel)]="editingProduit.nomProduit" class="w-full bg-white border border-gray-300 text-gray-800 rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:outline-none shadow-sm">
      </div>
      
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Prix (DH)</label>
          <input type="number" [(ngModel)]="editingProduit.prixProduit" class="w-full bg-white border border-gray-300 text-gray-800 rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:outline-none shadow-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Date</label>
          <input type="date" [ngModel]="editingProduit.dateProduit | date:'yyyy-MM-dd'" (ngModelChange)="editingProduit.dateProduit = $event" class="w-full bg-white border border-gray-300 text-gray-800 rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:outline-none shadow-sm">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">URL de l'image</label>
        <input type="text" [(ngModel)]="editingProduit.imageUrl" placeholder="https://..." class="w-full bg-white border border-gray-300 text-blue-600 rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:outline-none shadow-sm">
      </div>

      <div class="flex justify-end space-x-3 pt-4 border-t border-gray-200 mt-6">
        <button (click)="closeModal()" class="px-4 py-2 text-gray-500 hover:text-gray-800 transition-colors font-medium">Annuler</button>
        <button (click)="saveProduit()" class="px-6 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg font-bold transition-transform transform hover:-translate-y-0.5 shadow-md">Enregistrer</button>
      </div>
    </div>
  </div>
</div>
